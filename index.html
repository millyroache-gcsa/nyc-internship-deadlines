<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NYC Internships and Summer Opportunities</title>
    <style>
      :root {
        --bg: #f7f1e3;
        --bg-deep: #efe1bb;
        --paper: #fffdf8;
        --ink: #1e272c;
        --muted: #5a6670;
        --line: #d8caac;
        --accent: #0f5f78;
        --open: #17623f;
        --open-soft: #def3e7;
        --urgent: #9b1c1c;
        --urgent-soft: #fde5e5;
        --closed: #666;
        --closed-soft: #ececec;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 10%, rgba(15, 95, 120, 0.08), transparent 35%),
          radial-gradient(circle at 85% 5%, rgba(155, 28, 28, 0.06), transparent 30%),
          linear-gradient(180deg, var(--bg), var(--bg-deep));
        padding: 24px;
      }

      .page {
        max-width: 1100px;
        margin: 0 auto;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 20px 44px rgba(17, 30, 34, 0.12);
      }

      .hero {
        padding: 28px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, #fffaf0, #fffdf8);
      }

      .kicker {
        margin: 0;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 8px 0 10px;
        font-size: clamp(28px, 4vw, 46px);
        line-height: 1.05;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        max-width: 68ch;
      }

      .alert-row {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 7px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        border: 1px solid transparent;
      }

      .chip.open {
        color: var(--open);
        background: var(--open-soft);
        border-color: #badcc7;
      }

      .chip.urgent {
        color: var(--urgent);
        background: var(--urgent-soft);
        border-color: #efb9b9;
      }

      .chip.closed {
        color: var(--closed);
        background: var(--closed-soft);
        border-color: #d6d6d6;
      }

      .content {
        padding: 24px 28px 30px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .section-title {
        grid-column: 1 / -1;
        margin: 0;
        font-size: 22px;
      }

      .card {
        background: #fffdf8;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
      }

      .card h3 {
        margin: 10px 0 8px;
        font-size: 18px;
      }

      .meta {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .date {
        margin: 10px 0 12px;
        font-weight: 700;
      }

      .source {
        font-size: 14px;
      }

      .source a {
        color: var(--accent);
      }

      .note {
        grid-column: 1 / -1;
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 860px) {
        body {
          padding: 14px;
        }

        .hero,
        .content {
          padding: 18px;
        }

        .content {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script>
      const reviewed = "March 29, 2026";

      const internships = [
        {
          group: "High School / Mixed",
          name: "Summer Youth Employment Program (SYEP)",
          audience: "Ages 14-24",
          deadline: "Closed on March 13, 2026",
          status: "Closed",
          detail: "Official NYC SYEP page says no further applications may be submitted.",
          sourceLabel: "NYC SYEP",
          sourceUrl: "https://www.nyc.gov/SYEP"
        },
        {
          group: "High School / Mixed",
          name: "Ladders for Leaders",
          audience: "High school and college students, ages 16-24",
          deadline: "Closed on January 16, 2026",
          status: "Closed",
          detail: "DYCD lists the deadline extension to January 16, 2026.",
          sourceLabel: "DYCD Ladders for Leaders",
          sourceUrl: "https://www.nyc.gov/site/dycd/services/jobs-internships/nyc-ladders-for-leaders.page"
        },
        {
          group: "High School / Mixed",
          name: "Office of the Mayor Summer Internship",
          audience: "High school and college students",
          deadline: "March 29, 2026 at 11:59 PM",
          status: "Urgent",
          detail: "Official application window runs February 23 to March 29, 2026.",
          sourceLabel: "Mayor Internship Apply Page",
          sourceUrl: "https://a002-irm.nyc.gov/Handlers/Html/HtmlContent.ashx?pageId=abe7b8d5-a89d-4da3-b6b6-d0c2baaf2bac"
        },
        {
          group: "High School / Mixed",
          name: "NYC SCA High School Summer Internship",
          audience: "NYC high school students",
          deadline: "Closed on March 6, 2026",
          status: "Closed",
          detail: "SCA says completed applications were due by March 6, 2026.",
          sourceLabel: "NYC SCA Internship Program",
          sourceUrl: "https://nycsca.org/Careers/internship-Program"
        },
        {
          group: "College / Graduate",
          name: "NYC Comptroller Summer Internship",
          audience: "College, graduate, and law students",
          deadline: "Closed on March 9, 2026",
          status: "Closed",
          detail: "Official Comptroller page lists March 9, 2026 as the deadline.",
          sourceLabel: "NYC Comptroller Summer Internship",
          sourceUrl: "https://comptroller.nyc.gov/jobs/summer-internship-program/"
        },
        {
          group: "College / Graduate",
          name: "NYC DDC Summer College/Graduate Intern",
          audience: "College and graduate students",
          deadline: "March 31, 2026",
          status: "Open",
          detail: "CityJobs postings for DDC list March 31, 2026.",
          sourceLabel: "NYC DDC Posting",
          sourceUrl: "https://cityjobs.nyc.gov/job/summer-college-intern-in-queens-jid-39547"
        },
        {
          group: "College / Graduate",
          name: "NYS Internship Program",
          audience: "College and graduate students",
          deadline: "April 24, 2026",
          status: "Open",
          detail: "New York State lists the Summer 2026 application period through April 24, 2026.",
          sourceLabel: "NYS Internship Program",
          sourceUrl: "https://nysinternships.cs.ny.gov/"
        },
        {
          group: "College / Graduate",
          name: "CUNY x MTA Internship Program",
          audience: "CUNY students",
          deadline: "Applications opened in February 2026",
          status: "Open",
          detail: "CUNY says to apply in Handshake in February 2026; page does not show one hard cutoff.",
          sourceLabel: "CUNY x MTA Program",
          sourceUrl: "https://www.cuny.edu/about/administration/offices/ocip/students/mta-internship-program/"
        }
      ];

      const app = document.querySelector("#app");

      function statusClass(status) {
        if (status === "Urgent") return "urgent";
        if (status === "Closed") return "closed";
        return "open";
      }

      function renderSection(groupName) {
        return internships
          .filter((item) => item.group === groupName)
          .map(
            (item) => `
              <article class="card">
                <span class="chip ${statusClass(item.status)}">${item.status}</span>
                <h3>${item.name}</h3>
                <p class="meta">${item.audience}</p>
                <p class="date">${item.deadline}</p>
                <p class="meta">${item.detail}</p>
                <p class="source">Source: <a href="${item.sourceUrl}" target="_blank" rel="noopener noreferrer">${item.sourceLabel}</a></p>
              </article>
            `
          )
          .join("");
      }

      const urgent = internships.filter((item) => item.status === "Urgent");

      app.innerHTML = `
        <section class="page">
          <header class="hero">
            <p class="kicker">NYC Internship Roundup</p>
            <h1>Internships and Summer Opportunities</h1>
            <p>Last reviewed ${reviewed}. This page is updated manually from official program pages, so confirm deadlines before applying.</p>
            <div class="alert-row">
              ${
                urgent.length
                  ? urgent.map((item) => `<span class="chip urgent">${item.name}: ${item.deadline}</span>`).join("")
                  : '<span class="chip open">No same-day deadlines flagged right now.</span>'
              }
            </div>
          </header>

          <section class="content">
            <h2 class="section-title">High School / Mixed Programs</h2>
            ${renderSection("High School / Mixed")}

            <h2 class="section-title">College / Graduate Programs</h2>
            ${renderSection("College / Graduate")}

            <p class="note">If you want this refreshed later, ask me to regenerate the page and I can give you a new code block with updated dates.</p>
          </section>
        </section>
      `;
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TEST UPDATE</title>
    <style>
      :root {
        --bg: #f7f1e3;
        --bg-deep: #eadfbe;
        --paper: #fffdf8;
        --ink: #1d262b;
        --muted: #5a6670;
        --line: #d9cca8;
        --accent: #135d78;
        --accent-soft: #dceef5;
        --alert: #9b1c1c;
        --alert-soft: #fde4e4;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 10%, rgba(19, 93, 120, 0.09), transparent 34%),
          radial-gradient(circle at 90% 8%, rgba(155, 28, 28, 0.06), transparent 28%),
          linear-gradient(180deg, var(--bg), var(--bg-deep));
        padding: 24px;
      }

      .page {
        max-width: 1180px;
        margin: 0 auto;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 22px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(17, 30, 34, 0.12);
      }

      .hero {
        padding: 30px 28px 20px;
        border-bottom: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(255, 250, 240, 0.98), rgba(255, 253, 248, 0.98)),
          radial-gradient(circle at top right, rgba(19, 93, 120, 0.08), transparent 45%);
      }

      .eyebrow {
        margin: 0;
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      h1 {
        margin: 8px 0 10px;
        font-size: clamp(30px, 4vw, 48px);
        line-height: 1.05;
      }

      .hero-copy {
        margin: 0;
        max-width: 78ch;
        color: var(--muted);
        font-size: 16px;
      }

      .callout {
        margin-top: 18px;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
        background: rgba(255, 253, 248, 0.9);
      }

      .callout h2,
      .section-title {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .jump-list {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
      }

      .jump-list li {
        margin: 8px 0;
      }

      .jump-list a {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      .jump-list a:hover {
        text-decoration: underline;
      }

      .content {
        padding: 24px 28px 30px;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
        background: #fffdf8;
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
        border: 1px solid transparent;
      }

      .chip.deadline {
        color: var(--alert);
        background: var(--alert-soft);
        border-color: #efb8b8;
      }

      .chip.info {
        color: var(--accent);
        background: var(--accent-soft);
        border-color: #bdd8e4;
      }

      .card h3 {
        margin: 0 0 8px;
        font-size: 20px;
        line-height: 1.15;
      }

      .summary,
      .meta,
      .detail-list,
      .link-row {
        color: var(--muted);
        font-size: 14px;
      }

      .summary,
      .meta,
      .link-row {
        margin: 0 0 10px;
      }

      .label {
        color: var(--ink);
        font-weight: 700;
      }

      .detail-list {
        margin: 0 0 12px;
        padding-left: 18px;
      }

      .detail-list li {
        margin: 8px 0;
      }

      a {
        color: var(--accent);
      }

      .note {
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 900px) {
        body {
          padding: 14px;
        }

        .hero,
        .content {
          padding: 18px;
        }

        .cards {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main id="app"></main>

      function renderLinks(links) {
        return links
          .map((link) => `<a href="${link.url}" target="_blank" rel="noopener noreferrer">${link.label}</a>`)
          .join(" | ");
      }

      function renderCards() {
        return pageData.opportunities
          .map(
            (item) => `
              <article class="card" id="${item.id}">
                <div class="tag-row">
                  <span class="chip deadline">${item.deadline}</span>
                  ${item.tags.map((tag) => `<span class="chip info">${tag}</span>`).join("")}
                </div>
                <h3>${item.title}</h3>
                <p class="summary">${item.summary}</p>
                <p class="meta"><span class="label">Good fit if:</span> ${item.fit}</p>
                <ul class="detail-list">
                  ${item.details.map((detail) => `<li>${detail}</li>`).join("")}
                </ul>
                <p class="link-row">${renderLinks(item.links)}</p>
              </article>
            `
          )
          .join("");
      }

      document.querySelector("#app").innerHTML = `
        <section class="page">
          <header class="hero">
            <p class="eyebrow">NYC Student Opportunities</p>
            <h1>Spring and Summer 2026 Programs</h1>
            <p class="hero-copy">Current opportunities for high school students. More opportunities for college students will be posted soon.</p>
            <section class="callout">
              <h2>Current Open Programs</h2>
              <ul class="jump-list">
                ${pageData.topLinks
                  .map((item) => `<li><a href="#${item.target}">${item.label}</a> <span>(${item.deadline})</span></li>`)

            </section>
          </header>

          <section class="content">
            <h2 class="section-title">Programs and Applications</h2>

  </body>
</html>
